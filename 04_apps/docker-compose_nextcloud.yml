services:
  nextcloud-db:
    image: mariadb:11.8
    container_name: nextcloud_db
    restart: unless-stopped
    command: --transaction-isolation=READ-COMMITTED --binlog-format=ROW
    volumes:
      - ./db:/var/lib/mysql
    environment:
      - MARIADB_DATABASE=nextcloud
      - MARIADB_USER=nextcloud
      - MARIADB_PASSWORD=${NC_PWD}
      - MARIADB_ROOT_PASSWORD=${ROOT_PWD}
      - TZ=Europe/Prague
    networks:
      soho_net:
        ipv4_address: 172.19.0.20

  nextcloud-redis:
    image: redis:alpine
    container_name: nextcloud_redis
    restart: unless-stopped
    command: redis-server --requirepass "${REDIS_PWD}"
    networks:
      soho_net:
        ipv4_address: 172.19.0.21

  nextcloud-app:
    image: nextcloud:latest
    container_name: nextcloud_app
    restart: unless-stopped
    depends_on:
      - nextcloud-db
      - nextcloud-redis
    ports:
      - "8081:80"
    environment:
      - MYSQL_HOST=172.19.0.20
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud
      - MYSQL_PASSWORD=${NC_PWD}
      - REDIS_HOST=172.19.0.21
      - REDIS_HOST_PASSWORD=${REDIS_PWD}
      - NEXTCLOUD_TRUSTED_DOMAINS=cloud.mydomain.local
      - TRUSTED_PROXIES=172.19.0.0/25
      - OVERWRITEPROTOCOL=https
      - TZ=Europe/Prague
      - POSTGRES_HOST=nextcloud_db
      - REDIS_HOST=nextcloud_redis
      - PHP_MEMORY_LIMIT=1024M
      - PHP_UPLOAD_LIMIT=10G
      - APACHE_SERVERNAME=cloud.mydomain.local
      - PHP_OPCACHE_JIT=off
    volumes:
      - ./data:/var/www/html
    extra_hosts:
      - "aaa.mydomain.local:172.19.0.2"
      - "cloud.mydomain.local:172.19.0.2"
    networks:
      soho_net:
        ipv4_address: 172.19.0.9

networks:
  soho_net:
    external: true
